# Weekly CI: rebuild n8n-exif against the current official n8n:latest image.
# Align the cron below with your NAS auto-update schedule so failures are caught
# before (or when) the NAS pulls a fresh base image.
#
# Schedule: Saturday 06:00 GMT+8 (Friday 22:00 UTC).
# Manual run: Actions tab -> Weekly Docker CI -> Run workflow.
#
# Required repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (Docker Hub access token).
# Publishes a public GHCR image (no login required to pull). New packages default to
# private; the workflow sets visibility to public after each push.

name: Weekly Docker CI

on:
  schedule:
    - cron: "0 22 * * 5"
  workflow_dispatch:
    inputs:
      force_build:
        description: Build even if the resolved n8n version is unchanged
        type: boolean
        default: false

concurrency:
  group: weekly-docker-ci
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    env:
      LOCAL_IMAGE: n8n-exif:verify
      GHCR_IMAGE: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Restore last built version
        uses: actions/cache/restore@v4
        with:
          path: .ci
          key: n8n-exif-last-built

      - name: Check n8n version
        id: version-check
        env:
          FORCE_BUILD: ${{ inputs.force_build == true && 'true' || 'false' }}
          BUILD_ARG_FILE: ${{ runner.temp }}/build-args
          RESOLVE_PLATFORM: linux/amd64
        run: bash ./scripts/check-build-version.sh

      - name: Build and verify (linux/amd64)
        if: steps.version-check.outputs.build_needed == 'true'
        env:
          BUILD_ARG_FILE: ${{ steps.version-check.outputs.build_arg_file }}
          IMAGE: ${{ env.LOCAL_IMAGE }}
          PLATFORM: linux/amd64
        run: bash ./scripts/verify.sh

      - name: Log in to GHCR
        if: steps.version-check.outputs.build_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: steps.version-check.outputs.build_needed == 'true'
        run: |
          IMAGE_ID="$(echo "${GHCR_IMAGE}" | tr '[:upper:]' '[:lower:]')"
          VERSION="${{ steps.version-check.outputs.n8n_version }}"

          docker tag "${LOCAL_IMAGE}" "${IMAGE_ID}:latest"
          docker tag "${LOCAL_IMAGE}" "${IMAGE_ID}:${VERSION}"

          docker push "${IMAGE_ID}:latest"
          docker push "${IMAGE_ID}:${VERSION}"

          echo "ghcr_image=${IMAGE_ID}" >> "${GITHUB_OUTPUT}"
          echo "ghcr_tags=latest,${VERSION}" >> "${GITHUB_OUTPUT}"
        id: publish

      - name: Make GHCR package public
        if: steps.version-check.outputs.build_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"

          current="$(gh api "users/${OWNER}/packages/container/${PACKAGE_NAME}" --jq .visibility 2>/dev/null || true)"
          if [ "${current}" = "public" ]; then
            echo "GHCR package already public"
            exit 0
          fi

          if gh api --method PATCH "user/packages/container/${PACKAGE_NAME}" -f visibility=public; then
            echo "GHCR package visibility set to public"
            exit 0
          fi

          if gh api --method PATCH "orgs/${OWNER}/packages/container/${PACKAGE_NAME}" -f visibility=public; then
            echo "GHCR org package visibility set to public"
            exit 0
          fi

          echo "::warning::Could not set GHCR visibility via API. Open Packages -> ${PACKAGE_NAME} -> Package settings -> Change visibility -> Public."
          exit 0

      - name: Record last built version
        if: steps.version-check.outputs.build_needed == 'true'
        run: |
          mkdir -p .ci
          {
            printf 'N8N_VERSION=%s\n' "${{ steps.version-check.outputs.n8n_version }}"
            printf 'N8N_REGISTRY_IMAGE=%s\n' "${{ steps.version-check.outputs.n8n_registry_image }}"
            printf 'ALPINE_VERSION=%s\n' "${{ steps.version-check.outputs.alpine_version }}"
            printf 'BUILT_AT=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > .ci/last-built-version

      - name: Save last built version
        if: steps.version-check.outputs.build_needed == 'true'
        uses: actions/cache/save@v4
        with:
          path: .ci
          key: n8n-exif-last-built

      - name: Job summary
        if: always()
        run: |
          {
            echo "### Weekly Docker CI"
            echo ""
            echo "- **Trigger:** ${{ github.event_name }}"
            echo "- **Platform:** linux/amd64 (NAS / x86-64)"
            echo "- **Resolved n8n:** ${{ steps.version-check.outputs.n8n_registry_image }}:${{ steps.version-check.outputs.n8n_version }}"
            echo "- **Last built n8n:** ${{ steps.version-check.outputs.last_n8n_version || 'none' }}"
            if [ "${{ steps.version-check.outputs.build_needed }}" = "true" ]; then
              echo "- **Result:** built, verified, and published (${{ steps.version-check.outputs.skip_reason }})"
              echo "- **Pull (no login):** \`${{ steps.publish.outputs.ghcr_image }}:latest\`"
              echo "- **Rollback tag:** \`${{ steps.publish.outputs.ghcr_image }}:${{ steps.version-check.outputs.n8n_version }}\`"
              echo ""
              echo '```yaml'
              echo "image: ${{ steps.publish.outputs.ghcr_image }}:latest"
              echo '```'
            else
              echo "- **Result:** skipped (${{ steps.version-check.outputs.skip_reason }})"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
